server:
  # 18005 to coexist with the other Java tiers on the same host.
  port: ${SERVER_PORT:18005}
  # Long timeouts because LLM responses can take a while to start streaming.
  servlet:
    session:
      timeout: 30m

spring:
  application:
    name: wonder-toys-arconia-java
  # Keep noise low by default; bump via WONDER_TOYS_LOG_LEVEL env.
  output:
    ansi:
      enabled: detect
  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      chat:
        options:
          model: claude-sonnet-4-20250514
          max-tokens: 4096

# Arconia OTel auto-configuration. Endpoint + bearer auth go to Phoenix; metrics + logs are
# disabled because we only care about LLM traces here. The OpenInference project name is set
# as a resource attribute so Phoenix routes spans into the right project.
arconia:
  otel:
    enabled: true
    service:
      name: wonder-toys-arconia-java
    resource:
      attributes:
        openinference.project.name: ${PHOENIX_PROJECT_NAME:wonder-toys-arconia-java}
    exporter:
      otlp:
        # Base URL only — Arconia / OTel auto-append `/v1/traces`. So PHOENIX_COLLECTOR_ENDPOINT
        # here is the *base* (e.g. `https://app.phoenix.arize.com/s/your-space-name`), NOT the
        # full traces endpoint other tiers use. See env.example for the right form.
        endpoint: ${PHOENIX_COLLECTOR_ENDPOINT:http://localhost:6006}
        headers:
          # Phoenix Cloud uses `authorization: Bearer <key>`; self-hosted Phoenix at :6006
          # accepts requests without auth, in which case PHOENIX_API_KEY will be empty and
          # the header value just reads `Bearer `.
          authorization: Bearer ${PHOENIX_API_KEY:}
    metrics:
      enabled: false
    logs:
      enabled: false

logging:
  level:
    root: INFO
    com.wondertoys: ${WONDER_TOYS_LOG_LEVEL:INFO}
    org.springframework.ai: WARN
    org.springframework.web: WARN

wondertoys:
  chroma:
    url: ${CHROMA_URL:http://localhost:8000}
  backend:
    secret: ${BACKEND_SECRET:}
