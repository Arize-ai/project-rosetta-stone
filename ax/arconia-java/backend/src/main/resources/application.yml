server:
  # 18005 to coexist with the other Java tiers on the same host.
  port: ${SERVER_PORT:18005}
  # Long timeouts because LLM responses can take a while to start streaming.
  servlet:
    session:
      timeout: 30m

spring:
  application:
    name: wonder-toys-arconia-java
  # Keep noise low by default; bump via WONDER_TOYS_LOG_LEVEL env.
  output:
    ansi:
      enabled: detect
  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      chat:
        options:
          model: claude-sonnet-4-20250514
          max-tokens: 4096

# Arconia OTel auto-configuration. Endpoint is the AX gRPC OTLP collector. Headers carry the
# space_id + api_key. The OpenInference project name is set as a resource attribute so AX
# routes spans into the right project.
#
# The protocol selection (HTTP vs gRPC) is driven by the *signal-specific* property
# `arconia.otel.traces.exporter.otlp.protocol` — `@ConditionalOnProperty` on Arconia's bean
# factory methods checks the traces-prefixed key, NOT the parent `arconia.otel.exporter.otlp.*`.
arconia:
  otel:
    enabled: true
    service:
      name: wonder-toys-arconia-java
    resource:
      attributes:
        openinference.project.name: ${ARIZE_PROJECT_NAME:wonder-toys-arconia-java}
    traces:
      exporter:
        otlp:
          # gRPC endpoint — `https://otlp.arize.com:443`. Arconia uses the OkHttp gRPC sender
          # we added to build.gradle.kts (`opentelemetry-exporter-sender-okhttp`).
          endpoint: ${ARIZE_ENDPOINT:https://otlp.arize.com:443}
          protocol: grpc
          headers:
            # AX gRPC OTLP collector expects `space_id` + `api_key` headers (not `authorization`).
            space_id: ${ARIZE_SPACE_ID:}
            api_key: ${ARIZE_API_KEY:}
    metrics:
      enabled: false
    logs:
      enabled: false

logging:
  level:
    root: INFO
    com.wondertoys: ${WONDER_TOYS_LOG_LEVEL:INFO}
    org.springframework.ai: WARN
    org.springframework.web: WARN

wondertoys:
  chroma:
    url: ${CHROMA_URL:http://localhost:8000}
  backend:
    secret: ${BACKEND_SECRET:}
