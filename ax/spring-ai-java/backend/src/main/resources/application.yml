server:
  # 18002 to coexist with the LangChain4j tier (8001) on the same host.
  port: ${SERVER_PORT:18002}
  # Long timeouts because LLM responses can take a while to start streaming.
  servlet:
    session:
      timeout: 30m

spring:
  application:
    name: wonder-toys-spring-ai-java
  # Keep noise low by default; bump via WONDER_TOYS_LOG_LEVEL env.
  output:
    ansi:
      enabled: detect
  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      chat:
        options:
          model: claude-sonnet-4-6
          max-tokens: 4096

logging:
  level:
    root: INFO
    com.wondertoys: ${WONDER_TOYS_LOG_LEVEL:INFO}
    org.springframework.ai: WARN
    org.springframework.web: WARN

wondertoys:
  chroma:
    url: ${CHROMA_URL:http://localhost:8000}
  backend:
    secret: ${BACKEND_SECRET:}
  arize:
    endpoint: ${ARIZE_ENDPOINT:https://otlp.arize.com:443}
    space-id: ${ARIZE_SPACE_ID:}
    api-key: ${ARIZE_API_KEY:}
    project-name: ${ARIZE_PROJECT_NAME:wonder-toys-spring-ai-java}
